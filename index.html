<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>StratFounder</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- Splash Screen -->
    <!-- ========================= -->

    <div id="splash-screen">

        <img
            src="assets/logo/logo.png"
            class="splash-logo"
            alt="Logo">

        <img
            src="assets/logo/brand-logo.png"
            class="brand-logo"
            alt="StratFounder">

        <p class="splash-motto">

            Gaming with Ease

        </p>

        <div class="loading-container">

            <div class="loading-bar"></div>

        </div>

        <p id="loading-text">

            Loading Strategies...

        </p>

    </div>

    <!-- ========================= -->
    <!-- Menu Drawer -->
    <!-- ========================= -->

    <aside id="menu">

        <div class="menu-header">

            <img
                src="assets/logo/brand-logo.png"
                alt="StratFounder">

            <p>

                Gaming with Ease

            </p>

        </div>

        <div class="menu-items">

            <button>🤖 StratFounder AI</button>

            <button>👤 Sign In</button>

            <button>📨 Mail Us</button>

            <button>💡 Suggestion</button>

            <button>❓ Help & Support</button>

            <button>ℹ About</button>

            <button>⚙ Settings</button>

        </div>

    </aside>

    <!-- ========================= -->
    <!-- Main App -->
    <!-- ========================= -->

    <main id="app">

        <!-- Header -->

        <header class="hero">

            <button id="menu-btn">

                ☰

            </button>

            <img
                src="assets/logo/brand-logo.png"
                class="header-logo"
                alt="Brand Logo">

        </header>

        <!-- Search -->

        <section class="search-section">

            <input
                type="text"
                placeholder="Search heroes, games, guides...">

        </section>

        <!-- Popular Games -->

        <section class="games-section">

            <div class="section-title">

                <h2>

                    Popular Games

                </h2>

            </div>

            <div
                class="games-carousel"
                id="gamesContainer">

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
